services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 5s
      retries: 30

  agent:
    image: python:3.12-slim
    container_name: agent
    volumes:
      - ./exploit_agent.py:/app/exploit_agent.py
      - ./documents:/app/documents
      - ./poisoned:/app/poisoned
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      - OLLAMA_URL=http://ollama:11434

volumes:
  ollama_data:
