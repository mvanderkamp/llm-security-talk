<!DOCTYPE html>
<html>
<head>
    <title>Simple Search Demo</title>
</head>
<body>
    <!--
      http://127.0.0.1:4000/xss_reflected.html?q=<img src=x onerror=alert('hacked')>
    -->
    <h1>My Search Engine</h1>

    <input type="text" id="search-input" placeholder="Search...">
    <button>Search</button>

    <div id="results">
        <p>Showing results for: <span id="display-query"></span></p>
    </div>

    <script>
        // 1. Get the 'q' parameter from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');

        if (query) {
            // 2. VULNERABLE LINE:
            // Using .innerHTML tells the browser to parse the string as HTML code.
            document.getElementById('display-query').innerHTML = query;

            // Populate the input box for realism
            document.getElementById('search-input').value = query;
        }
    </script>
</body>
</html>
