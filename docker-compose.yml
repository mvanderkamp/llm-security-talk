---
services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30

  model-pull:
    image: ollama/ollama
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "llama3.2:3b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  agent:
    image: python:3.12-slim
    container_name: agent
    depends_on:
      model-pull:
        condition: service_completed_successfully
    volumes:
      - ./exploit_agent.py:/app/exploit_agent.py
      - ./documents:/app/documents
      - ./poisoned:/app/poisoned
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      - OLLAMA_URL=http://ollama:11434

volumes:
  ollama_data:
