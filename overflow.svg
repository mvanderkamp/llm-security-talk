<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="100%" height="100%"
    style="background-color:#f8f9fb; font-family: Arial, Helvetica, sans-serif;">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="rarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="380" y="40" font-size="22" font-weight="bold" text-anchor="middle" fill="#111">BUFFER OVERFLOW</text>
  <text x="380" y="60" font-size="13" text-anchor="middle" fill="#777">A stack buffer overflow overwrites the return address — redirecting execution to attacker-supplied data</text>

  <!-- ── DIVIDER ── -->
  <line x1="380" y1="82" x2="380" y2="370" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ── NORMAL ── -->
  <text x="230" y="92" font-size="15" font-weight="bold" text-anchor="middle" fill="#111">Normal input</text>

  <rect x="155" y="102" width="150" height="36" fill="#ebebeb" stroke="#bbb" stroke-width="1.5" rx="2"/>
  <text x="230" y="125" font-size="12" text-anchor="middle" fill="#999">caller's stack ...</text>

  <rect x="155" y="138" width="150" height="44" fill="#e8e8e8" stroke="#aaa" stroke-width="1.5" rx="2"/>
  <text x="230" y="156" font-size="13" text-anchor="middle" fill="#555">return address</text>
  <text x="230" y="174" font-size="13" font-family="monospace" text-anchor="middle" fill="#234">0x00401234</text>

  <rect x="155" y="182" width="150" height="60" fill="#9ecae1" stroke="#aaa" stroke-width="1.5" rx="2"/>
  <text x="230" y="202" font-size="13" text-anchor="middle" fill="#234">buffer</text>
  <text x="230" y="221" font-size="14" font-family="monospace" text-anchor="middle" fill="#234">HELLO\0\0\0</text>

  <rect x="155" y="242" width="150" height="36" fill="#ebebeb" stroke="#bbb" stroke-width="1.5" rx="2"/>
  <text x="230" y="265" font-size="12" text-anchor="middle" fill="#999">... rest of frame</text>

  <text x="230" y="305" font-size="13" font-family="monospace" text-anchor="middle" fill="#234">"HELLO"</text>
  <line x1="230" y1="288" x2="230" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="230" y="338" font-size="12" text-anchor="middle" fill="#555">CPU returns to</text>
  <text x="230" y="354" font-size="13" font-family="monospace" text-anchor="middle" fill="#234">0x00401234</text>
  <text x="230" y="370" font-size="12" text-anchor="middle" fill="#555">(legitimate code)</text>

  <!-- ── OVERFLOW ── -->
  <text x="530" y="92" font-size="15" font-weight="bold" text-anchor="middle" fill="#c0392b">Overflowing input</text>

  <rect x="455" y="102" width="150" height="36" fill="#ebebeb" stroke="#bbb" stroke-width="1.5" rx="2"/>
  <text x="530" y="125" font-size="12" text-anchor="middle" fill="#999">caller's stack ...</text>

  <rect x="455" y="138" width="150" height="44" fill="#fc9272" stroke="#c0392b" stroke-width="1.5" rx="2"/>
  <text x="530" y="156" font-size="13" text-anchor="middle" fill="#5a0000">return address</text>
  <text x="530" y="174" font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#5a0000">0xBFFFF698</text>

  <rect x="455" y="182" width="150" height="60" fill="#fc9272" stroke="#c0392b" stroke-width="1.5" rx="2"/>
  <text x="530" y="204" font-size="13" text-anchor="middle" fill="#5a0000">buffer</text>
  <text x="530" y="224" font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#5a0000">[ SHELLCODE ]</text>

  <rect x="455" y="242" width="150" height="36" fill="#ebebeb" stroke="#bbb" stroke-width="1.5" rx="2"/>
  <text x="530" y="265" font-size="12" text-anchor="middle" fill="#999">... rest of frame</text>

  <text x="530" y="305" font-size="13" font-family="monospace" text-anchor="middle" fill="#c0392b">shellcode + \xBF\xFF\xF6\x98</text>
  <line x1="530" y1="288" x2="530" y2="280" stroke="#c0392b" stroke-width="1.5" marker-end="url(#rarr)"/>

  <!-- Hijack arc -->
  <path d="M 605 160 Q 650 160 650 212 Q 650 242 608 224"
        fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#rarr)"/>
  <text x="656" y="196" font-size="12" font-weight="bold" fill="#c0392b">execution</text>
  <text x="656" y="211" font-size="12" font-weight="bold" fill="#c0392b">jumps here</text>

  <text x="530" y="338" font-size="12" text-anchor="middle" fill="#c0392b">CPU "returns" to</text>
  <text x="530" y="354" font-size="13" font-family="monospace" text-anchor="middle" fill="#c0392b">0xBFFFF698</text>
  <text x="530" y="370" font-size="12" text-anchor="middle" fill="#c0392b">(attacker's shellcode)</text>

  <!-- KEY INSIGHT BOX -->
  <rect x="80" y="400" width="600" height="70" rx="6" fill="#fff8e1" stroke="#f0c040" stroke-width="1.5"/>
  <text x="380" y="423" font-size="13" font-weight="bold" text-anchor="middle" fill="#7a5800">Key insight</text>
  <text x="380" y="442" font-size="13" text-anchor="middle" fill="#555">The CPU makes no distinction between data and instructions.</text>
  <text x="380" y="460" font-size="13" text-anchor="middle" fill="#555">If you can write bytes into memory and point the instruction pointer at them, they <tspan font-weight="bold">become</tspan> code.</text>
</svg>
