<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 378" width="100%" height="100%"
    style="background-color:#f8f9fb; font-family: Arial, Helvetica, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="red_arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- DIVIDER -->
  <line x1="380" y1="72" x2="380" y2="365" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- NORMAL -->
  <text x="230" y="86" font-size="15" font-weight="bold" text-anchor="middle" fill="#111">Normal input</text>

  <text x="230" y="102" font-size="13" font-family="monospace" text-anchor="middle" fill="#234">"HELLO"</text>
  <line x1="230" y1="108" x2="230" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="155" y="128" width="150" height="34" fill="#ebebeb" stroke="#bbb" stroke-width="1.5"/>
  <text x="230" y="150" font-size="12" text-anchor="middle" fill="#999">caller's stack ...</text>

  <!-- defined early to make it lower in z order -->
  <rect x="155" y="266" width="150" height="34" fill="#ebebeb" stroke="#bbb" stroke-width="1.5"/>
  <text x="230" y="288" font-size="12" text-anchor="middle" fill="#999">... rest of frame</text>

  <rect x="155" y="162" width="150" height="46" fill="#e8e8e8" stroke="#aaa" stroke-width="1.5"/>
  <text x="230" y="180" font-size="13" text-anchor="middle" fill="#555">return address</text>
  <text x="230" y="199" font-size="13" font-family="monospace" text-anchor="middle" fill="#234">0x00401234</text>

  <rect x="155" y="208" width="150" height="58" fill="#9ecae1" stroke="#aaa" stroke-width="1.5"/>
  <text x="230" y="230" font-size="13" text-anchor="middle" fill="#234">buffer</text>
  <text x="230" y="249" font-size="14" font-family="monospace" text-anchor="middle" fill="#234">HELLO</text>

  <text x="230" y="322" font-size="12" text-anchor="middle" fill="#555">CPU returns to</text>
  <text x="230" y="339" font-size="13" font-family="monospace" text-anchor="middle" fill="#234">0x00401234</text>
  <text x="230" y="356" font-size="12" text-anchor="middle" fill="#555">(legitimate code)</text>

  <!-- OVERFLOW -->
  <text x="530" y="86" font-size="15" font-weight="bold" text-anchor="middle" fill="#c0392b">Overflowing input</text>

  <text x="530" y="102" font-size="13" font-family="monospace" text-anchor="middle" fill="#c0392b">shellcode + \xBF\xFF\xF6\x98</text>
  <line x1="530" y1="108" x2="530" y2="123" stroke="#c0392b" stroke-width="1.5" marker-end="url(#red_arrow)"/>

  <rect x="455" y="128" width="150" height="34" fill="#ebebeb" stroke="#bbb" stroke-width="1.5"/>
  <text x="530" y="150" font-size="12" text-anchor="middle" fill="#999">caller's stack ...</text>

  <!-- defined early to make it lower in z order -->
  <rect x="455" y="266" width="150" height="34" fill="#ebebeb" stroke="#bbb" stroke-width="1.5"/>
  <text x="530" y="288" font-size="12" text-anchor="middle" fill="#999">... rest of frame</text>

  <rect x="455" y="162" width="150" height="46" fill="#fc9272" stroke="#c0392b" stroke-width="1.5"/>
  <text x="530" y="180" font-size="13" text-anchor="middle" fill="#5a0000">return address</text>
  <text x="530" y="199" font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#5a0000">0xBFFFF698</text>

  <rect x="455" y="208" width="150" height="58" fill="#fc9272" stroke="#c0392b" stroke-width="1.5"/>
  <text x="530" y="230" font-size="13" text-anchor="middle" fill="#5a0000">buffer</text>
  <text x="530" y="249" font-size="13" font-family="monospace" font-weight="bold" text-anchor="middle" fill="#5a0000">[ SHELLCODE ]</text>

  <!-- Hijack arc -->
  <path d="M 605 185 Q 648 185 648 237 Q 648 258 608 244"
        fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#red_arrow)"/>
  <text x="654" y="214" font-size="12" font-weight="bold" fill="#c0392b">execution</text>
  <text x="654" y="229" font-size="12" font-weight="bold" fill="#c0392b">jumps here</text>

  <text x="530" y="322" font-size="12" text-anchor="middle" fill="#c0392b">CPU "returns" to</text>
  <text x="530" y="339" font-size="13" font-family="monospace" text-anchor="middle" fill="#c0392b">0xBFFFF698</text>
  <text x="530" y="356" font-size="12" text-anchor="middle" fill="#c0392b">(attacker's shellcode)</text>
</svg>
